<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kilometrina kompaktno</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f7f9; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #111827; }
    .wrap { width: 1120px; margin: 56px auto; }
    .card { background: #fff; border: 1px solid #dbe1ea; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06); }
    .header, .row { display: grid; grid-template-columns: 34% 18% 10% 12% 10% 12% 4%; align-items: center; min-height: 46px; }
    .header { color: #6b7280; font-size: 13px; font-weight: 600; border-bottom: 1px solid #e5e7eb; }
    .row { font-size: 14px; }
    .cell { padding: 8px 12px; }
    .name { padding-left: 18px; font-weight: 500; }
    .right { text-align: right; }
    .qty { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    button { height: 32px; border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; padding: 0 9px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #1f2937; }
    .note { font-size: 12px; font-weight: 600; color: #b45309; white-space: nowrap; }
    input { width: 86px; height: 36px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 0 10px; text-align: right; font-size: 14px; }
    .trash { color: #6b7280; text-align: center; }
    .popover { margin: 10px 0 0 445px; width: 330px; border: 1px solid #dbe1ea; background: #fff; border-radius: 8px; padding: 10px 12px; font-size: 12px; line-height: 1.45; color: #374151; box-shadow: 0 12px 28px rgba(15, 23, 42, 0.14); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="header">
        <div class="cell name">Naziv</div><div class="cell right">Količina</div><div class="cell right">Enota</div><div class="cell right">Cena</div><div class="cell right">DDV %</div><div class="cell right">Skupaj</div><div></div>
      </div>
      <div class="row">
        <div class="cell name">Potni stroški [km]</div>
        <div class="cell qty"><button>↻ Izračunaj</button><span class="note">⚠ približek</span><input value="359,4" /></div>
        <div class="cell right">km</div>
        <div class="cell right">0,43 €</div>
        <div class="cell right">22</div>
        <div class="cell right">188,72 €</div>
        <div class="trash">🗑</div>
      </div>
    </section>
    <div class="popover">Geocoder našel: Ulica heroja Šaranoviča 23, Maribor.<br />179,7 km × 2 = 359,4 km. Preveri naslov če ni točen.</div>
  </main>
</body>
</html>

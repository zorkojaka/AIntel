name: Deploy Staging to Hetzner

on:
  push:
    branches:
      - 'codex/**'
      - 'dev/**'

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 178.104.24.47 >> ~/.ssh/known_hosts

      - name: Deploy staging via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          SSH_USER: ${{ secrets.HETZNER_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh -i ~/.ssh/id_rsa -o ServerAliveInterval=30 -o ServerAliveCountMax=30 "$SSH_USER@178.104.24.47" <<EOF
          set -e
          bash /home/jaka/deploy-aintel-staging.sh ${GITHUB_REF_NAME}
          EOF
